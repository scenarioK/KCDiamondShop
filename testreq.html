<<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Document</title>
  </head>
  <body>
    <script>
      async function validateUser(userId, zoneId) {
        const url = "https://order-sg.codashop.com/validate";

        // API သို့ ပို့မည့် JSON Data payload
        const requestData = {
          voucherTypeName: "MOBILE_LEGENDS",
          country: "MM",
          userId: userId.toString(),
          zoneId: zoneId.toString()
        };

        try {
          const response = await fetch(url, {
            method: "POST",
            headers: {
              // ပေးထားသော Headers အားလုံး အပြည့်အစုံ
              authority: "order-sg.codashop.com",
              accept: "application/json, text/plain, */*",
              authorization:
                "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCIsIlgtaWF0IjoxNzMzNjMzMTA1NjcwfQ.eyJ2b3VjaGVyVHlwZU5hbWUiOiJNT0JJTEVfTEVHRU5EUyIsImNvdW50cnkiOiJNTSIsImRldmljZUlkIjoiZTNlYzA5ZjYtN2M3OS00ZmZmLWI0OTItZTY4NzMxOTNlOWY3Iiwid2hpdGVMYWJlbElkIjoiIiwidXNlcklkIjoiNzkwMDc4NDI2Iiwiem9uZUlkIjoiMTIxNjEifQ.I6oyJtW6uTXuNnCJQDy566UqSK5FdaBumRloaQSk2Z4",
              origin: "https://www.codashop.com",
              referer: "https://www.codashop.com/",
              "sec-ch-ua": '"Not-A.Brand";v="99", "Chromium";v="124"',
              "sec-ch-ua-mobile": "?1",
              "sec-ch-ua-platform": '"Android"',
              "sec-fetch-dest": "empty",
              "sec-fetch-mode": "cors",
              "sec-fetch-site": "same-site",
              "user-agent":
                "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Mobile Safari/537.36",
              "Content-Type": "application/json"
            },
            body: JSON.stringify(requestData)
          });

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const data = await response.json();

          // API က Error ပြန်ရင် စစ်ထုတ်ခြင်း
          if (data.success === false || data.errorCode) {
            alert("Validation Failed:", data.errorMsg);
            return {
              success: false,
              message: data.errorMsg || "Error occurred"
            };
          }

          // Success ဖြစ်ရင်
          alert("Validation Success:", data.result);
          return {
            success: true,
            username: decodeURIComponent(data.result.username).replace(
              /\+/g,
              " "
            ),
            rawData: data.result
          };
        } catch (error) {
          alert("Network or Request Error:", error);
          return {
            success: false,
            message:
              "Request မအောင်မြင်ပါ။ Header ပါ Token သက်တမ်းကုန်/မကုန် စစ်ဆေးပေးပါ။"
          };
        }
      }

      validateUser(853750677, 12390);
    </script>
  </body>
</html>
